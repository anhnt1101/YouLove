<!doctype html>
<html lang="vi">
  <head>
    <script>
      // Prevent Web3 browser extension collision (e.g. MetaMask/Rabby) in sandboxed iframes from halting execution
      (function() {
        try {
          const originalDefineProperty = Object.defineProperty;
          Object.defineProperty = function(obj, prop, descriptor) {
            if (obj === window && prop === 'ethereum' && descriptor) {
              try {
                descriptor.configurable = true;
              } catch (err) {}
            }
            return originalDefineProperty.call(Object, obj, prop, descriptor);
          };
        } catch (e) {
          console.warn('Ethereum collision guard failed:', e);
        }

        // Catch and prevent browser extension crash logs from polluting console in sandbox iframes
        window.addEventListener('error', function(event) {
          const filename = event.filename || '';
          const message = event.message || '';
          if (
            filename.indexOf('extension') !== -1 ||
            filename.indexOf('contentscript') !== -1 ||
            filename.indexOf('onboarding') !== -1 ||
            message.indexOf('getImageNode') !== -1 ||
            message.indexOf('ethereum') !== -1
          ) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return true;
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          if (reason) {
            const message = reason.message || String(reason);
            const stack = reason.stack || '';
            if (
              message.indexOf('getImageNode') !== -1 ||
              message.indexOf('extension') !== -1 ||
              message.indexOf('contentscript') !== -1 ||
              message.indexOf('onboarding') !== -1 ||
              stack.indexOf('onboarding') !== -1 ||
              stack.indexOf('contentscript') !== -1
            ) {
              event.stopImmediatePropagation();
              event.preventDefault();
              return true;
            }
          }
        }, true);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E❤️%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Love - Sổ Đếm Ngày Yêu & Nhật Ký Chu Kỳ</title>
  </head>

  </body>
</html>
